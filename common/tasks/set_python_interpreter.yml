# NOTE: We cannot rely on ansible gathered facts until the interpreter has been set.
#       Therefore, we must gather required facts manually.
- name: Manually set required facts prior to ansible gathered facts execution
  tags: always
  block:
    - name: Check operating system
      ansible.builtin.raw: uname -s
      register: os_result
      changed_when: false
      tags: always

    - name: Get user's home directory on Unix
      ansible.builtin.raw: echo $HOME
      register: user_home_result
      changed_when: false

    - name: Set unix_home_path fact
      ansible.builtin.set_fact:
        unix_home_path: "{{ user_home_result.stdout | trim }}"

- name: Set and manage python interpreter for MSYS2 on Windows
  when: "'msys' in os_result.stdout | lower or 'mingw' in os_result.stdout | lower"
  tags: always
  block:
    - name: Force Ansible to use MSYS2 Python
      ansible.builtin.set_fact:
        ansible_python_interpreter: /usr/bin/python3

    - name: Check for MinGW64 Python
      ansible.builtin.raw: test -f /mingw64/bin/python.exe
      register: mingw_python_check
      changed_when: false
      failed_when: false

    - name: Get Windows path for MinGW64 Python
      ansible.builtin.command: cygpath -u /mingw64/bin/python.exe
      register: mingw_python_win_path
      changed_when: false
      when: mingw_python_check.rc == 0

    - name: Get user's home directory in Windows format
      ansible.builtin.command: cygpath -u "{{ unix_home_path }}"
      register: win_home_path_result
      changed_when: false

    - name: Set facts for MinGW Python usage
      ansible.builtin.set_fact:
        use_mingw_python: "{{ mingw_python_check.rc == 0 }}"
        base_python_interpreter: "{{ mingw_python_win_path.stdout | trim if mingw_python_check.rc == 0 else '/usr/bin/python3' }}"
        venv_path: "{{ unix_home_path }}/.venvs/local-machine-config"

    - name: Check if existing venv matches current interpreter
      ansible.builtin.shell: |
        if [ -f "{{ venv_path }}/pyvenv.cfg" ]; then
          if grep -q "{{ base_python_interpreter }}" "{{ venv_path }}/pyvenv.cfg"; then
            echo "match"
          else
            echo "mismatch"
          fi
        else
          echo "missing"
        fi
      register: venv_interpreter_check
      changed_when: false

    - name: Remove mismatched venv
      ansible.builtin.file:
        path: "{{ venv_path }}"
        state: absent
      when: venv_interpreter_check.stdout == "mismatch"

    - name: Create virtual environment
      ansible.builtin.command:
        cmd: "{{ base_python_interpreter }} -m venv --system-site-packages {{ venv_path }}"
        creates: "{{ venv_path }}/pyvenv.cfg"

    - name: Install required packages (pip, pipx) in venv (Unix)
      ansible.builtin.command:
        cmd: "{{ venv_path }}/bin/python -m pip install pip pipx"
      changed_when: false
      when: not use_mingw_python

    - name: Bootstrap pip in venv (Windows)
      ansible.builtin.command:
        cmd: "{{ venv_path }}/bin/python -m ensurepip --upgrade --default-pip"
      changed_when: false
      when: use_mingw_python

    - name: Install required packages (pip, pipx) in venv (Windows)
      ansible.builtin.command:
        cmd: "{{ venv_path }}/bin/python -m pip install pip pipx"
      changed_when: false
      when: use_mingw_python

    - name: Set ansible_python_interpreter to use the new venv
      ansible.builtin.set_fact:
        ansible_python_interpreter: "{{ venv_path }}/bin/python"
      when: not use_mingw_python

- name: Set and manage python interpreter for Unix systems
  when: "'Linux' in os_result.stdout or 'Darwin' in os_result.stdout"
  tags: always
  block:
    - name: Set initial python interpreter
      ansible.builtin.set_fact:
        ansible_python_interpreter: "{{ '/opt/homebrew/bin/python3' if 'Darwin' in os_result.stdout else '/usr/bin/python3' }}"

    - name: Manage python dependencies on Debian-like systems
      when: "'Linux' in os_result.stdout"
      block:
        - name: Check for debian-like OS on Linux systems
          ansible.builtin.raw: cat /etc/os-release
          register: os_release_result
          changed_when: false

        - name: Install python3-venv package on Debian-like systems
          ansible.builtin.apt:
            name: python3-venv
            state: present
            update_cache: true
          become: true
          when:
            - "os_release_result.stdout is defined"
            - "'debian' in os_release_result.stdout or 'ubuntu' in os_release_result.stdout"

    - name: Manage python dependencies on macOS
      when: "'Darwin' in os_result.stdout"
      block:
        - name: Uninstall any conflicting python-packaging packages
          ansible.builtin.command:
            cmd: "{{ ansible_python_interpreter }} -m pip uninstall -y python-packaging --break-system-packages"
          register: uninstall_result
          changed_when: "'Successfully uninstalled' in uninstall_result.stdout"

        # NOTE: ansible.builtin.pip is dependent on python-packaging
        - name: Install python-packaging for brew managed pip
          community.general.homebrew:
            name: python-packaging
            state: latest
            update_homebrew: true

    - name: Ensure virtual environment exists and has required packages
      ansible.builtin.pip:
        name:
          - pexpect
          - bcrypt
          - cryptography
          - pipx
        state: latest
        virtualenv: "{{ unix_home_path }}/.venvs/local-machine-config"
        virtualenv_command: "{{ ansible_python_interpreter }} -m venv"

    - name: Set ansible_python_interpreter to use the new venv
      ansible.builtin.set_fact:
        ansible_python_interpreter: "{{ unix_home_path }}/.venvs/local-machine-config/bin/python"
