- name: Install MCP tools (macOS)
  ansible.builtin.include_tasks: macos.yml
  when: is_mac

- name: Install MCP tools (Linux)
  ansible.builtin.include_tasks: linux.yml
  when: is_debian_family

- name: Install MCP tools (Windows)
  ansible.builtin.include_tasks: windows.yml
  when: is_windows

- name: Set pnpm executable path (Windows)
  when: is_windows
  block:
    - name: Get user's home directory path in POSIX format
      ansible.builtin.command:
        cmd: cygpath -u "{{ ansible_facts['env']['USERPROFILE'] }}"
      register: configure_mcp_win_home_dir
      changed_when: false

    - name: Get pnpm executable path from Scoop (Windows)
      ansible.builtin.command:
        cmd: "{{ configure_mcp_win_home_dir.stdout }}/scoop/shims/scoop.cmd which pnpm"
      register: configure_mcp_pnpm_path_raw
      changed_when: false
      environment:
        HOME: "{{ ansible_facts['env']['USERPROFILE'] }}"
        USERPROFILE: "{{ ansible_facts['env']['USERPROFILE'] }}"
      failed_when: >-
        configure_mcp_pnpm_path_raw.rc != 0 or
        'WARN' in configure_mcp_pnpm_path_raw.stdout or
        'not found' in configure_mcp_pnpm_path_raw.stdout

    - name: Set pnpm and node facts
      ansible.builtin.set_fact:
        # NOTE: We convert the Windows-style path (with tildes and backslashes) into a POSIX-style
        #       path that the MSYS2-based Ansible executor can understand and execute.
        configure_mcp_pnpm_executable: "{{ configure_mcp_pnpm_path_raw.stdout | trim | replace('~', configure_mcp_win_home_dir.stdout) | regex_replace('\\\\', '/') }}"
        configure_mcp_nodejs_path: "{{ configure_mcp_win_home_dir.stdout }}/scoop/persist/nvm/nodejs/nodejs"

- name: Configure MCP servers (JSON)
  ansible.builtin.include_tasks: configure_mcp.yml

- name: Configure Gemini Extensions
  ansible.builtin.include_tasks: configure_extensions.yml
