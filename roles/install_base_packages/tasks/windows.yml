- name: Install windows packages
  when: is_windows
  block:
    # NOTE: The following packages are required for lazyvim and its plugins.
    #       - mingw-w64-x86_64-fd: Required by lazyvim and snacks for file searching
    #       - mingw-w64-x86_64-lua-luarocks: Required by lazy and mason for Lua plugin management
    #       - mingw-w64-x86_64-imagemagick: Required by snacks for image previews
    #       - mingw-w64-x86_64-sqlite3: Required by lazyvim and snacks for history and frecency
    - name: Install required packages for Windows with MSYS2
      community.general.pacman:
        name:
          - mingw-w64-x86_64-python
          - mingw-w64-x86_64-python-pip
          - mingw-w64-x86_64-python-pipx
          - mingw-w64-x86_64-python-setuptools
          - mingw-w64-x86_64-python-argcomplete
          - mingw-w64-x86_64-python-packaging
          - mingw-w64-x86_64-python-platformdirs
          - mingw-w64-x86_64-python-userpath
          - mingw-w64-x86_64-toolchain
          - mingw-w64-x86_64-rust
          - mingw-w64-x86_64-maturin
          - mingw-w64-x86_64-python-cffi
          - mingw-w64-x86_64-python-bcrypt
          - mingw-w64-x86_64-python-cryptography
          - mingw-w64-x86_64-fzf
          - mingw-w64-x86_64-ripgrep
          - mingw-w64-x86_64-jq
          - mingw-w64-x86_64-fd
          - mingw-w64-x86_64-lua-luarocks
          - mingw-w64-x86_64-imagemagick
          - mingw-w64-x86_64-sqlite3
          - mingw-w64-x86_64-tldr
          - bash-completion
          - stow
          - tree
          - openssh
        state: latest
        update_cache: true
        extra_args: --overwrite "*"

    - name: Install Scoop packages
      block:
        - name: Get user's home directory in POSIX format
          ansible.builtin.command:
            cmd: cygpath -u "{{ ansible_facts['env']['USERPROFILE'] }}"
          register: install_base_packages_win_home_posix_raw
          changed_when: false

        - name: Set scoop root and executable facts
          ansible.builtin.set_fact:
            install_base_packages_win_home_posix: "{{ install_base_packages_win_home_posix_raw.stdout | trim }}"
            install_base_packages_scoop_root: "{{ install_base_packages_win_home_posix_raw.stdout | trim }}/scoop"
            install_base_packages_scoop_root_win: "{{ ansible_facts['env']['USERPROFILE'] }}\\scoop"
            install_base_packages_scoop_executable_path: "{{ install_base_packages_win_home_posix_raw.stdout | trim }}/scoop/shims/scoop.cmd"

    - name: Remove conflicting system Node.js installation
      ansible.builtin.command:
        cmd: powershell.exe -Command "Remove-Item -Path 'C:\Program Files\nodejs' -Recurse -Force -ErrorAction SilentlyContinue"
      register: install_base_packages_remove_node_result
      failed_when: false
      changed_when: false

    - name: Set fact if Node.js removal failed
      ansible.builtin.set_fact:
        install_base_packages_node_removal_failed: "{{ install_base_packages_remove_node_result.rc != 0 }}"

    - name: Ensure required Scoop buckets are added
      ansible.builtin.command:
        cmd: "{{ install_base_packages_scoop_executable_path }} bucket add {{ item }}"
      loop:
        - main
        - extras
        - nerd-fonts
      register: scoop_bucket_add
      failed_when:
        - scoop_bucket_add.rc != 0
        - "'already added' not in scoop_bucket_add.stdout"
      changed_when: "'Successfully added' in scoop_bucket_add.stdout"

    - name: Update Scoop and buckets
      ansible.builtin.command:
        cmd: "{{ install_base_packages_scoop_executable_path }} update"
      changed_when: false
      ignore_errors: true

    - name: Define Scoop packages list
      ansible.builtin.set_fact:
        install_base_packages_scoop_list:
          # NOTE: nvm-windows does not use standard Scoop shims; it manages its own PATH and symlinks.
          #       We set skip_which_check to true to avoid 'scoop which' validation failures.
          - name: nvm
            executable_name: nvm
            skip_which_check: true
          - name: gh
            executable_name: gh
          - name: gnupg
            executable_name: gpg
          - name: neovim
            executable_name: nvim
          - name: lazygit
            executable_name: lazygit
          - name: alacritty
            executable_name: alacritty
          - name: cascadiacode-nf
          - name: perl
            executable_name: perl
          - name: pnpm
            executable_name: pnpm

    - name: Process Scoop packages
      ansible.builtin.include_tasks: ../../../common/tasks/install_scoop_package.yml
      loop: "{{ install_base_packages_scoop_list }}"
      loop_control:
        loop_var: scoop_package

    - name: Ensure NVM root directory exists
      ansible.builtin.file:
        path: "{{ install_base_packages_win_home_posix }}/scoop/persist/nvm/nodejs"
        state: directory
        mode: "0755"

    - name: Configure NVM root and symlink path
      ansible.builtin.command:
        cmd: >
          powershell.exe -Command "
          $settings = '{{ install_base_packages_scoop_root_win }}\apps\nvm\current\settings.txt';
          $root = '{{ install_base_packages_scoop_root_win }}\persist\nvm\nodejs';
          $path = '{{ install_base_packages_scoop_root_win }}\persist\nvm\nodejs\nodejs';
          'root: ' + $root + \"`r`n\" + 'path: ' + $path + \"`r`n\" + 'arch: 64' + \"`r`n\" + 'proxy: none' | Out-File -Encoding ASCII $settings;
          Write-Host 'Updated NVM settings.txt';"
      changed_when: false
      environment:
        NVM_HOME: "{{ install_base_packages_scoop_root_win }}\\apps\\nvm\\current"
        NVM_SYMLINK: "{{ install_base_packages_scoop_root_win }}\\persist\\nvm\\nodejs\\nodejs"

    - name: Install Node.js LTS via NVM
      ansible.builtin.command:
        cmd: "{{ install_base_packages_scoop_root }}/apps/nvm/current/nvm.exe install lts"
      register: install_base_packages_nvm_install
      changed_when: "'is already installed' not in install_base_packages_nvm_install.stdout"
      failed_when:
        - install_base_packages_nvm_install.rc != 0
        - "'already installed' not in install_base_packages_nvm_install.stdout"
      environment:
        NVM_HOME: "{{ install_base_packages_scoop_root_win }}\\apps\\nvm\\current"
        NVM_SYMLINK: "{{ install_base_packages_scoop_root_win }}\\persist\\nvm\\nodejs\\nodejs"

    - name: Set Node.js version fact from NVM install output
      ansible.builtin.set_fact:
        # NOTE: nvm-windows output contains "Installing node.js vXX.XX.XX" or "Version XX.XX.XX is already installed."
        #       We use regex_findall to extract the version following 'v' or 'Version ' and pick the first match.
        install_base_packages_nvm_node_version: "{{ install_base_packages_nvm_install.stdout | regex_findall('(?:node\\.js v|Version )(\\d+\\.\\d+\\.\\d+)') | first | default('') }}"

    - name: Use Node.js LTS via NVM
      ansible.builtin.command:
        cmd: "{{ install_base_packages_scoop_root }}/apps/nvm/current/nvm.exe use {{ install_base_packages_nvm_node_version }}"
      when:
        - install_base_packages_nvm_node_version is defined
        - install_base_packages_nvm_node_version != ""
      changed_when: false
      environment:
        NVM_HOME: "{{ install_base_packages_scoop_root_win }}\\apps\\nvm\\current"
        NVM_SYMLINK: "{{ install_base_packages_scoop_root_win }}\\persist\\nvm\\nodejs\\nodejs"

    - name: Download and Install AutoHotkey v1.1
      block:
        # NOTE: We are not using scoop to install AutoHotkey because the manifest
        #       points to the official website, which is protected by Cloudflare and
        #       returns a 403 Forbidden error. Instead, we download the installer
        #       from the official GitHub releases.
        - name: Download AutoHotkey v1.1 installer
          ansible.builtin.get_url:
            url: https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02_setup.exe
            dest: /tmp/autohotkey_setup.exe
            mode: '0755'

        - name: Install AutoHotkey v1.1 silently
          ansible.builtin.command:
            cmd: powershell.exe -Command "/tmp/autohotkey_setup.exe /S"
          args:
            creates: /c/Program Files/AutoHotkey/AutoHotkey.exe
          register: install_base_packages_install_ahk
          changed_when: install_base_packages_install_ahk.rc == 0
          ignore_errors: true

        - name: Set fact if AutoHotkey installation failed due to permissions
          ansible.builtin.set_fact:
            install_base_packages_autohotkey_install_failed_due_to_permissions: >-
              {{ install_base_packages_install_ahk.failed and
                 ('Permission denied' in install_base_packages_install_ahk.stderr or
                  'access is denied' in install_base_packages_install_ahk.stderr or
                  'failed to start' in install_base_packages_install_ahk.stderr or
                  'denied' in install_base_packages_install_ahk.stdout or
                  'failed' in install_base_packages_install_ahk.stdout) }}
          when: install_base_packages_install_ahk.failed

        - name: Adjust has_admin_privileges fact if AutoHotkey installation failed due to permissions
          ansible.builtin.set_fact:
            install_base_packages_has_admin_privileges: false
          when:
            - install_base_packages_autohotkey_install_failed_due_to_permissions is defined
            - install_base_packages_autohotkey_install_failed_due_to_permissions

    - name: Get user's home directory path in POSIX format
      ansible.builtin.command:
        cmd: cygpath -u "{{ ansible_facts['env']['USERPROFILE'] }}"
      register: install_base_packages_win_home_dir_raw
      changed_when: false

    - name: Check if pipx shared environment exists
      ansible.builtin.stat:
        path: "{{ install_base_packages_win_home_dir_raw.stdout }}/.local/pipx/shared/pyvenv.cfg"
      register: install_base_packages_pipx_shared_venv_cfg

    - name: Check if pipx shared environment is MinGW-based
      ansible.builtin.command:
        cmd: grep -q "mingw64" "{{ install_base_packages_win_home_dir_raw.stdout }}/.local/pipx/shared/pyvenv.cfg"
      register: install_base_packages_pipx_shared_is_mingw
      changed_when: false
      failed_when: false
      when: install_base_packages_pipx_shared_venv_cfg.stat.exists

    - name: Remove incompatible (non-MinGW) pipx shared environment
      ansible.builtin.file:
        path: "{{ install_base_packages_win_home_dir_raw.stdout }}/.local/pipx/shared"
        state: absent
      when:
        - install_base_packages_pipx_shared_venv_cfg.stat.exists
        - install_base_packages_pipx_shared_is_mingw.rc != 0

    - name: Get pnpm executable path from Scoop
      ansible.builtin.command:
        cmd: "{{ install_base_packages_scoop_executable_path }} which pnpm"
      register: pnpm_executable_path_raw
      changed_when: false
      environment:
        HOME: "{{ ansible_facts['env']['USERPROFILE'] }}"
        USERPROFILE: "{{ ansible_facts['env']['USERPROFILE'] }}"
      failed_when: >-
        pnpm_executable_path_raw.rc != 0 or
        'WARN' in pnpm_executable_path_raw.stdout or
        'not found' in pnpm_executable_path_raw.stdout

    - name: Set pnpm executable path fact
      ansible.builtin.set_fact:
        # NOTE: We convert the Windows-style path (with tildes and backslashes) into a POSIX-style
        #       path that the MSYS2-based Ansible executor can understand and execute.
        #       We use regex_replace with '\\\\' which YAML turns into '\\' and Jinja2/Regex turns into a single literal '\'.
        install_base_packages_pnpm_executable_path: "{{ pnpm_executable_path_raw.stdout | trim | replace('~', install_base_packages_win_home_posix) | regex_replace('\\\\', '/') }}"

    - name: Ensure pnpm global directory exists
      ansible.builtin.file:
        path: "{{ install_base_packages_win_home_posix }}/AppData/Local/pnpm"
        state: directory
        mode: "0755"

    - name: Configure pnpm global-bin-dir
      ansible.builtin.command:
        cmd: "{{ install_base_packages_pnpm_executable_path }} config set global-bin-dir \"{{ ansible_facts['env']['USERPROFILE'] }}\\AppData\\Local\\pnpm\""
      changed_when: false

    - name: Configure pnpm pnpm-home
      ansible.builtin.command:
        cmd: "{{ install_base_packages_pnpm_executable_path }} config set pnpm-home \"{{ ansible_facts['env']['USERPROFILE'] }}\\AppData\\Local\\pnpm\""
      changed_when: false

    - name: Install pnpm packages
      # NOTE: We use the absolute path to the pnpm executable obtained from `scoop which`
      #       to ensure we are using the correct, Scoop-managed binary.
      ansible.builtin.command:
        cmd: "{{ install_base_packages_pnpm_executable_path }} add -g {{ item }}"
      environment:
        PNPM_HOME: "{{ ansible_facts['env']['USERPROFILE'] }}\\AppData\\Local\\pnpm"
        # NOTE: We explicitly add the NVM symlink path to the PATH to ensure that
        #       pnpm can find the newly installed Node.js version even if the
        #       shell environment hasn't been refreshed yet.
        PATH: >-
          {{ install_base_packages_win_home_posix }}/AppData/Local/pnpm:{{ install_base_packages_scoop_root }}/persist/nvm/nodejs/nodejs:{{ ansible_facts.env.PATH }}
      with_items:
        - tree-sitter-cli
        - neovim
      changed_when: false
