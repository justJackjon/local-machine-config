- name: Clear stale GPG locks
  ansible.builtin.shell: |
    gpgconf --kill all || true
    rm -f ~/.gnupg/public-keys.d/*.lock || true
    rm -f ~/.gnupg/public-keys.d/.#* || true
    rm -f ~/.gnupg/.#* || true
  args:
    executable: /bin/bash
  changed_when: false

- name: Check for existing GPG secret key
  ansible.builtin.shell: |
    set -o pipefail
    gpg --list-secret-keys --with-colons "{{ configure_git_user_email }}" | grep '^sec'
  args:
    executable: /bin/bash
  register: configure_git_gpg_secret_key_check
  changed_when: false
  failed_when: false

- name: Ensure .gnupg directory exists
  ansible.builtin.file:
    path: ~/.gnupg
    state: directory
    mode: "0700"

- name: Prompt for GPG key passphrase
  ansible.builtin.pause:
    prompt: "Enter GPG key passphrase"
    echo: false
  register: configure_git_gpg_passphrase_prompt
  no_log: true
  when: configure_git_gpg_secret_key_check.stdout == ""

- name: Confirm GPG key passphrase
  ansible.builtin.pause:
    prompt: "Confirm GPG key passphrase"
    echo: false
  register: configure_git_gpg_passphrase_confirm
  no_log: true
  when: configure_git_gpg_secret_key_check.stdout == ""

- name: Set fact if GPG key passphrases match
  ansible.builtin.set_fact:
    configure_git_is_gpg_passphrases_match: "{{ configure_git_gpg_passphrase_prompt.user_input == configure_git_gpg_passphrase_confirm.user_input }}"
  when: configure_git_gpg_secret_key_check.stdout == "" and configure_git_gpg_passphrase_prompt is defined

- name: Fail if GPG key passphrases don't match
  ansible.builtin.fail:
    msg: "GPG key passphrases don't match!"
  when: configure_git_gpg_secret_key_check.stdout == "" and not configure_git_is_gpg_passphrases_match

- name: Create GPG key
  ansible.builtin.shell: |
    gpg --batch --pinentry-mode loopback --passphrase "{{ configure_git_gpg_passphrase_prompt.user_input }}" --full-generate-key <<EOF
    Key-Type: RSA
    Key-Length: 4096
    Subkey-Type: RSA
    Subkey-Length: 4096
    Name-Real: {{ configure_git_user_name }}
    Name-Email: {{ configure_git_user_email }}
    Name-Comment: ansible-managed
    Expire-Date: 0
    %commit
    EOF
  args:
    executable: /bin/bash
  register: configure_git_gpg_create_result
  when: configure_git_gpg_secret_key_check.stdout == ""
  changed_when: configure_git_gpg_create_result.rc == 0
  no_log: true
  failed_when:
    - configure_git_gpg_create_result.rc != 0
    - "'already exists' not in configure_git_gpg_create_result.stderr"

- name: Get GPG key fingerprint
  ansible.builtin.shell: |
    set -o pipefail
    # NOTE: Extracting the short GPG key fingerprint (last 16 characters) for git configuration.
    gpg --list-secret-keys --with-colons "{{ configure_git_user_email }}" | grep '^sec' | cut -d: -f5 | tail -c 17
  args:
    executable: /bin/bash
  register: configure_git_gpg_fingerprint
  changed_when: false

- name: Export GPG public key
  ansible.builtin.shell: |
    gpg --armor --export "{{ configure_git_gpg_fingerprint.stdout }}"
  args:
    executable: /bin/bash
  register: configure_git_gpg_public_key
  changed_when: false

- name: Get remote GPG keys from GitHub
  ansible.builtin.shell: |
    set -o pipefail
    gh api user/gpg_keys | jq -r '.[].key_id'
  args:
    executable: /bin/bash
  register: configure_git_remote_gpg_keys
  changed_when: false

- name: Set fact if GPG key is already on GitHub
  ansible.builtin.set_fact:
    configure_git_is_gpg_key_already_on_github: "{{ configure_git_gpg_fingerprint.stdout in configure_git_remote_gpg_keys.stdout_lines }}"

- name: Add GPG key to GitHub
  ansible.builtin.shell: |
    set -o pipefail
    echo "{{ configure_git_gpg_public_key.stdout }}" | gh gpg-key add --title "{{ ansible_facts.hostname }} GPG Key (ansible-managed)" -
  args:
    executable: /bin/bash
  register: configure_git_add_gpg_key_result
  when: not configure_git_is_gpg_key_already_on_github
  changed_when: configure_git_add_gpg_key_result.rc == 0
  failed_when:
    - configure_git_add_gpg_key_result.rc != 0
    - "'already exist' not in configure_git_add_gpg_key_result.stderr"
    - "'key is already in use' not in configure_git_add_gpg_key_result.stderr"
