# NOTE: The logic of this role was not changed when it was converted from a playbook.
#       There is extensive refactoring required to make it OS agnostic, however, this was out of scope for the conversion work.
- name: Configure Keyboard
  block:
    - name: Set OS and hardware facts
      tags: configure_keyboard
      ansible.builtin.set_fact:
        configure_keyboard_is_debian_os_on_gb_chromebook: >
          {{
            ansible_facts.os_family == 'Debian' and
            (ansible_facts.env.LANGUAGE | default('')) == 'en_GB:en' and
            ansible_facts.system_vendor == 'GOOGLE'
          }}
        configure_keyboard_apply_xfce_kinto_settings: "{{ is_inside_xfce or (is_windows and configure_keyboard_enable_windows_xfce_mode) }}"

    - name: Set Windows specific facts
      tags: configure_keyboard
      when: is_windows
      block:
        - name: Get user's home directory path in POSIX format
          ansible.builtin.command: cygpath -u "{{ ansible_facts['env']['USERPROFILE'] }}"
          register: configure_keyboard_user_home_posix
          changed_when: false

        - name: Set windows paths facts
          ansible.builtin.set_fact:
            configure_keyboard_windows_home_posix: "{{ configure_keyboard_user_home_posix.stdout }}"
            configure_keyboard_windows_downloads_path: "{{ configure_keyboard_user_home_posix.stdout }}/Downloads"

    - name: Apply Custom Keyboard Mappings for Debian based systems on Chromebook hardware
      tags: configure_keyboard
      when: configure_keyboard_is_debian_os_on_gb_chromebook
      block:
        - name: Create ~/.Xmodmap with custom key mappings
          ansible.builtin.copy:
            content: |
              keycode 11 = 2 at
              keycode 12 = 3 sterling numbersign
              keycode 48 = apostrophe quotedbl
              keycode 49 = section plusminus
              keycode 51 = backslash bar
              keycode 94 = grave asciitilde
              keycode 108 = Mode_switch Mode_switch Mode_switch Mode_switch
            dest: "/home/{{ ansible_facts.user_id }}/.Xmodmap"
            mode: "0644"
          register: configure_keyboard_xmodmap_copy_result

        - name: Apply custom key mappings with xmodmap # noqa: no-handler
          when: configure_keyboard_xmodmap_copy_result.changed
          ansible.builtin.command: xmodmap /home/{{ ansible_facts.user_id }}/.Xmodmap
          changed_when: true

    - name: Configure General Keyboard Shortcuts
      tags: configure_keyboard
      block:
        - name: Check current value for cycle_windows_key
          when: is_inside_xfce
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel
              - xfce4-keyboard-shortcuts
              - --property
              - "/xfwm4/custom/<Primary>Tab"
          register: configure_keyboard_current_cycle_windows_key
          changed_when: false

        - name: Set cycle_windows_key if different
          when: is_inside_xfce and configure_keyboard_current_cycle_windows_key.stdout != "cycle_windows_key"
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel=xfce4-keyboard-shortcuts
              - --property="/xfwm4/custom/<Primary>Tab"
              - --create
              - --type
              - string
              - --set
              - "cycle_windows_key"
          changed_when: true

        - name: Check current value for cycle_reverse_windows_key
          when: is_inside_xfce
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel
              - xfce4-keyboard-shortcuts
              - --property
              - "/xfwm4/custom/<Primary><Shift>Tab"
          register: configure_keyboard_current_cycle_reverse_windows_key
          changed_when: false

        - name: Set cycle_reverse_windows_key if different
          when: is_inside_xfce and configure_keyboard_current_cycle_reverse_windows_key.stdout != "cycle_reverse_windows_key"
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel=xfce4-keyboard-shortcuts
              - --property="/xfwm4/custom/<Primary><Shift>Tab"
              - --create
              - --type
              - string
              - --set
              - "cycle_reverse_windows_key"
          changed_when: true

        - name: Check if /commands/custom/<Super>l exists before resetting
          when: is_inside_xfce
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel
              - xfce4-keyboard-shortcuts
              - --property
              - "/commands/custom/<Super>l"
          register: configure_keyboard_current_super_l_key_check
          ignore_errors: true
          changed_when: false

        - name: Reset /commands/custom/<Super>l if it exists
          when: is_inside_xfce and configure_keyboard_current_super_l_key_check.rc == 0 # Only reset if property existed
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel=xfce4-keyboard-shortcuts
              - --property="/commands/custom/<Super>l"
              - --reset
          changed_when: true # Assume change if property existed and was reset

        - name: Check current value for xflock4_key
          when: is_inside_xfce
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel
              - xfce4-keyboard-shortcuts
              - --property
              - "/commands/custom/<Primary><Alt>q"
          register: configure_keyboard_current_xfce_lock_key
          changed_when: false

        - name: Set xflock4_key if different
          when: is_inside_xfce and configure_keyboard_current_xfce_lock_key.stdout != "xflock4"
          ansible.builtin.command:
            argv:
              - xfconf-query
              - --channel=xfce4-keyboard-shortcuts
              - --property="/commands/custom/<Primary><Alt>q"
              - --create
              - --type
              - string
              - --set
              - "xflock4"
          changed_when: true

    - name: Configure Workspace Switching Shortcuts
      tags: configure_keyboard
      block:
        - name: Configure XFCE workspace shortcuts
          when: is_inside_xfce
          block:
            - name: Get current workspace count
              ansible.builtin.command:
                argv:
                  - xfconf-query
                  - -c
                  - xfwm4
                  - -p
                  - /general/workspace_count
              register: configure_keyboard_current_workspace_count
              changed_when: false

            - name: Set workspace count to 10 if different
              ansible.builtin.command:
                argv:
                  - xfconf-query
                  - -c
                  - xfwm4
                  - -p
                  - /general/workspace_count
                  - -s
                  - "10"
              when: configure_keyboard_current_workspace_count.stdout != "10"
              changed_when: true

            - name: Execute XFCE4 workspace switching shortcut deletion script # noqa: line-length
              ansible.builtin.command: bash "{{ role_path }}/files/{{ configure_keyboard_xfce4_shortcut_deletion_script_path }}"
              register: configure_keyboard_xfce4_deletion_script_result
              changed_when: >
                configure_keyboard_xfce4_deletion_script_result.stdout | length > 0 or
                configure_keyboard_xfce4_deletion_script_result.stderr | length > 0

            - name: Execute XFCE4 workspace switching shortcut creation script # noqa: line-length
              ansible.builtin.command: bash "{{ role_path }}/files/{{ configure_keyboard_xfce4_shortcut_creation_script_path }}"
              register: configure_keyboard_xfce4_creation_script_result
              changed_when: >
                configure_keyboard_xfce4_creation_script_result.stdout | length > 0 or
                configure_keyboard_xfce4_creation_script_result.stderr | length > 0

        - name: Configure MacOS workspace shortcuts
          when: is_mac
          block:
            - name: Set creation script permissions
              ansible.builtin.file:
                path: "{{ role_path }}/files/{{ configure_keyboard_macos_shortcut_creation_script_path }}"
                mode: "0744"

            - name: Execute MacOS workspace switching shortcut creation script # noqa: line-length
              # NOTE: Requires bash 4 or higher to provide support for associative arrays.
              # Because the `shell` module runs `sh` by default unless it is symlinked to
              # `/bin/bash`, the `command` module is used instead to spawn a bash shell.
              ansible.builtin.command: "bash {{ role_path }}/files/{{ configure_keyboard_macos_shortcut_creation_script_path }}"
              register: configure_keyboard_macos_creation_script_result
              changed_when: >
                configure_keyboard_macos_creation_script_result.stdout | length > 0 or
                configure_keyboard_macos_creation_script_result.stderr | length > 0

    - name: Install Kinto
      tags: configure_keyboard
      when: not is_wsl
      block:
        - name: Install Kinto on Linux
          when: ansible_facts.system == 'Linux'
          block:
            - name: Install Kinto dependencies
              when: ansible_facts.pkg_mgr == 'apt'
              ansible.builtin.apt:
                name: gir1.2-vte-2.91
                state: present
              become: true

            - name: Create a temporary directory for the Kinto install script
              ansible.builtin.tempfile:
                state: directory
                suffix: _install_kinto
              register: configure_keyboard_tempdir

            - name: Download Kinto install script
              ansible.builtin.get_url:
                url: https://raw.githubusercontent.com/rbreaves/kinto/HEAD/install/linux.sh
                dest: "{{ configure_keyboard_tempdir.path }}/install_kinto.sh"
                mode: "0755"
              register: configure_keyboard_kinto_download_result

            - name: Run Kinto install script
              when: configure_keyboard_kinto_download_result is success
              ansible.builtin.shell:
                cmd: "{{ configure_keyboard_tempdir.path }}/install_kinto.sh"
              args:
                executable: /bin/bash
              register: configure_keyboard_kinto_install_result
              changed_when: >
                configure_keyboard_kinto_install_result.stdout | length > 0 or
                configure_keyboard_kinto_install_result.stderr | length > 0

        - name: Install Kinto on Windows
          when: is_windows
          block:
            - name: Create Downloads directory if it does not exist
              ansible.builtin.file:
                path: "{{ configure_keyboard_windows_downloads_path }}"
                state: directory
                mode: "0755"

            - name: Download Kinto zip
              ansible.builtin.get_url:
                url: https://github.com/rbreaves/kinto/archive/refs/heads/master.zip
                dest: "{{ configure_keyboard_windows_downloads_path }}/kinto.zip"
                mode: "0644"

            - name: Extract Kinto zip
              ansible.builtin.unarchive:
                src: "{{ configure_keyboard_windows_downloads_path }}/kinto.zip"
                dest: "{{ configure_keyboard_windows_downloads_path }}"
                remote_src: true
                creates: "{{ configure_keyboard_windows_downloads_path }}/kinto-master"

            - name: Re-implement Kinto setup script with native Ansible tasks
              block:
                - name: Ensure .kinto directories exist
                  ansible.builtin.file:
                    path: "{{ item }}"
                    state: directory
                    mode: "0755"
                  with_items:
                    - "{{ configure_keyboard_windows_home_posix }}/.kinto"
                    - "{{ configure_keyboard_windows_home_posix }}/.kinto/assets"

                - name: Copy base kinto.ahk
                  ansible.builtin.copy:
                    src: "{{ configure_keyboard_windows_downloads_path }}/kinto-master/windows/kinto.ahk"
                    dest: "{{ configure_keyboard_windows_home_posix }}/.kinto/kinto.ahk"
                    remote_src: true
                    mode: "0644"

                - name: Define Windows path for downloads directory
                  ansible.builtin.command: cygpath -w "{{ configure_keyboard_windows_downloads_path }}"
                  register: configure_keyboard_windows_downloads_path_win
                  changed_when: false

                - name: Import Ubuntu theme registry file
                  ansible.builtin.shell: >
                    powershell.exe -Command "Start-Process -FilePath regedit.exe
                    -ArgumentList '/s \"{{ configure_keyboard_windows_downloads_path_win.stdout }}\kinto-master\windows\theme_ubuntu.reg\"'
                    -Wait"
                  changed_when: true

                - name: Copy assets
                  ansible.builtin.copy:
                    src: "{{ configure_keyboard_windows_downloads_path }}/kinto-master/assets/"
                    dest: "{{ configure_keyboard_windows_home_posix }}/.kinto/assets/"
                    remote_src: true
                    mode: "0644"

                - name: Copy other Kinto Windows scripts
                  ansible.builtin.copy:
                    src: "{{ configure_keyboard_windows_downloads_path }}/kinto-master/windows/{{ item }}"
                    dest: "{{ configure_keyboard_windows_home_posix }}/.kinto/{{ item }}"
                    remote_src: true
                    mode: "0644"
                  with_items:
                    - kinto-start.vbs
                    - usb.vbs
                    - detectUSB.ahk
                    - NoShell.vbs
                    - toggle_kb.bat

                - name: Get mixed-style path for perl.exe
                  ansible.builtin.command:
                    cmd: "cygpath -m {{ configure_keyboard_windows_home_posix }}/scoop/apps/perl/current/perl/bin/perl.exe"
                  register: configure_keyboard_perl_exe_mixed_path
                  changed_when: false

                - name: Update Perl path in toggle_kb.bat for Scoop installation
                  ansible.builtin.replace:
                    path: "{{ configure_keyboard_windows_home_posix }}/.kinto/toggle_kb.bat"
                    regexp: 'C:\\Strawberry\\perl\\bin\\perl.exe'
                    replace: "{{ configure_keyboard_perl_exe_mixed_path.stdout }}"
                    backup: true

                - name: Patch kbtype in kinto-start.vbs
                  ansible.builtin.replace:
                    path: "{{ configure_keyboard_windows_home_posix }}/.kinto/kinto-start.vbs"
                    regexp: "{kbtype}"
                    replace: "win"

                - name: Remove runas from kinto-start.vbs to avoid UAC prompt
                  ansible.builtin.replace:
                    path: "{{ configure_keyboard_windows_home_posix }}/.kinto/kinto-start.vbs"
                    regexp: 'oShell.ShellExecute "C:\\Program Files\\AutoHotkey\\AutoHotkey.exe", strFolder, , "runas", 0'
                    replace: 'oShell.ShellExecute "C:\\Program Files\\AutoHotkey\\AutoHotkey.exe", strFolder, , , 0'

                - name: Remove runas from NoShell.vbs to avoid UAC prompt
                  ansible.builtin.replace:
                    path: "{{ configure_keyboard_windows_home_posix }}/.kinto/NoShell.vbs"
                    regexp: 'oShell.ShellExecute prog, RunCmd, , "runas", 0'
                    replace: 'oShell.ShellExecute prog, RunCmd, , , 0'

                - name: Get Windows style path for .kinto directory
                  ansible.builtin.command: cygpath -w "{{ configure_keyboard_windows_home_posix }}/.kinto"
                  register: configure_keyboard_kinto_dir_win
                  changed_when: false

                - name: Get Windows style path for Startup folder
                  ansible.builtin.command: cygpath -w "{{ ansible_facts['env']['APPDATA'] }}/Microsoft/Windows/Start Menu/Programs/Startup"
                  register: configure_keyboard_startup_dir_win
                  changed_when: false

                - name: Create shortcut in Windows Startup folder
                  ansible.builtin.command:
                    argv:
                      - cmd.exe
                      - /c
                      - mklink
                      - "{{ configure_keyboard_startup_dir_win.stdout }}\\\\kinto-start.vbs"
                      - "{{ configure_keyboard_kinto_dir_win.stdout }}\\\\kinto-start.vbs"
                  args:
                    creates: "{{ configure_keyboard_startup_dir_win.stdout }}\\\\kinto-start.vbs"
                  register: configure_keyboard_kinto_install_result_win

                - name: Run Kinto for the first time
                  ansible.builtin.command: >
                    powershell.exe -Command "Start-Process -FilePath 'C:\Program Files\AutoHotkey\AutoHotkey.exe'
                    -ArgumentList '\"{{ configure_keyboard_kinto_dir_win.stdout | replace('\\', '\\\\') }}\\kinto.ahk\" win'"
                  changed_when: true

    - name: Clean-up Kinto.sh Install
      tags: configure_keyboard
      when: >
        not is_wsl and
        ((configure_keyboard_kinto_install_result is defined and configure_keyboard_kinto_install_result is changed) or
         (configure_keyboard_kinto_install_result_win is defined and configure_keyboard_kinto_install_result_win is changed))
      block:
        - name: Remove files downloaded by Kinto install script on Linux
          when: ansible_facts.system == 'Linux'
          ansible.builtin.file:
            path: "/home/{{ ansible_facts.user_id }}/Downloads/{{ item }}"
            state: absent
          loop:
            - kinto-master
            - kinto.zip
          become: true

        - name: Remove files downloaded by Kinto install script on Windows
          when: is_windows
          ansible.builtin.file:
            path: "{{ configure_keyboard_windows_downloads_path }}/{{ item }}"
            state: absent
          loop:
            - kinto-master
            - kinto.zip

    - name: Configure Kinto
      tags: configure_keyboard
      when: not is_wsl
      block:
        - name: Uncomment XFCE4 specific lines in Kinto.py when current desktop is XFCE4
          when: configure_keyboard_apply_xfce_kinto_settings and not is_windows
          ansible.builtin.replace:
            path: "{{ configure_keyboard_kinto_config_path }}"
            regexp: '^(\s*)([#\s]+)(.*\s(?!not-)xfce4[\s\w]*)$'
            replace: '\1\3'
            backup: true
          register: configure_keyboard_xfce_changes

        - name: Modify shortcuts for en_GB Chromebook keyboard layouts in kinto.py
          when: configure_keyboard_is_debian_os_on_gb_chromebook and not is_windows
          block:
            - name: Modify general GUI related shortcuts
              ansible.builtin.blockinfile:
                path: "{{ configure_keyboard_kinto_config_path }}"
                block: "{{ lookup('file', 'snippets/kinto/gui_shortcuts') }}"
                marker: "# {mark}: ANSIBLE MANAGED GENERAL GUI SHORTCUTS"
                insertbefore: '\s*\},\s*"General GUI"\s*'
              register: configure_keyboard_gui_changes

            - name: Modify terminal related shortcuts
              ansible.builtin.blockinfile:
                path: "{{ configure_keyboard_kinto_config_path }}"
                block: "{{ lookup('file', 'snippets/kinto/terminal_shortcuts') }}"
                marker: "# {mark}: ANSIBLE MANAGED TERMINAL SHORTCUTS"
                insertbefore: '\s*\},\s*"terminals"\s*'
              register: configure_keyboard_terminal_changes

        - name: Restart xkeysnail service after making changes to kinto.py
          when:
            - not is_wsl
            - not is_windows
            - >
              (configure_keyboard_xfce_changes is defined and configure_keyboard_xfce_changes.changed) or
              (configure_keyboard_gui_changes is defined and configure_keyboard_gui_changes.changed) or
              (configure_keyboard_terminal_changes is defined and configure_keyboard_terminal_changes.changed)
          ansible.builtin.systemd:
            name: xkeysnail
            state: restarted
          register: configure_keyboard_kinto_config_result
          become: true

        - name: Restart Kinto on Windows
          when:
            - is_windows
            - >
              (configure_keyboard_xfce_changes is defined and configure_keyboard_xfce_changes.changed) or
              (configure_keyboard_gui_changes is defined and configure_keyboard_gui_changes.changed) or
              (configure_keyboard_terminal_changes is defined and configure_keyboard_terminal_changes.changed)
          block:
            # TODO: Implement a reliable way to find and restart kinto.exe
            - name: Kill Kinto process
              ansible.builtin.command: powershell.exe -Command "Stop-Process -Name kinto -Force -ErrorAction SilentlyContinue"
              changed_when: false
            - name: Start Kinto
              ansible.builtin.command: powershell.exe -Command "Start-Process kinto.exe"
              register: configure_keyboard_kinto_config_result
              changed_when: true

        - name: Restart xkeysnail service for WSL
          when:
            - is_wsl
            - >
              (configure_keyboard_xfce_changes is defined and configure_keyboard_xfce_changes.changed) or
              (configure_keyboard_gui_changes is defined and configure_keyboard_gui_changes.changed) or
              (configure_keyboard_terminal_changes is defined and configure_keyboard_terminal_changes.changed)
          ansible.builtin.shell: |
            pkill -f "xkeysnail"
            sudo /usr/bin/xkeysnail --quiet --watch {{ configure_keyboard_kinto_config_path }} &
          args:
            executable: /bin/bash
          become: true
          register: configure_keyboard_kinto_config_result_wsl
          changed_when: true

    - name: Manage Kinto Backup Files
      tags: configure_keyboard
      when: not is_wsl
      block:
        - name: Retain latest backup file only
          when:
            - (configure_keyboard_kinto_config_result is defined and configure_keyboard_kinto_config_result is changed) or
              (configure_keyboard_kinto_config_result_wsl is defined and configure_keyboard_kinto_config_result_wsl is changed)
          block:
            - name: Get list of backup files
              when: ansible_facts.system == "Linux"
              ansible.builtin.set_fact:
                configure_keyboard_backup_files: "{{ lookup('fileglob', configure_keyboard_kinto_config_path ~ '.*', wantlist=true) }}"

            - name: Extract timestamps from backup filenames # noqa: line-length
              ansible.builtin.set_fact:
                configure_keyboard_backup_files_with_ts: "{{ configure_keyboard_backup_files | map('regex_replace', '.*\\.(.*)~', '\\1') | list }}"

            - name: Sort backup files by extracted timestamps
              ansible.builtin.set_fact:
                configure_keyboard_backup_files_sorted: >-
                  {{
                    configure_keyboard_backup_files |
                    zip(configure_keyboard_backup_files_with_ts) |
                    sort(attribute='1') |
                    map(attribute='0') |
                    list
                  }}

            - name: Remove older backup files whilst retaining the latest backup
              when: configure_keyboard_backup_files_sorted is defined and configure_keyboard_backup_files_sorted|length > 1
              ansible.builtin.file:
                path: "{{ item }}"
                state: absent
              loop: "{{ configure_keyboard_backup_files_sorted[:-1] }}"
