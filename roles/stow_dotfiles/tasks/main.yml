- name: Get user's home directory path in POSIX format
  when: is_windows
  ansible.builtin.command:
    cmd: cygpath -u "{{ ansible_facts['env']['USERPROFILE'] }}"
  register: stow_dotfiles_win_home_dir
  changed_when: false

- name: Set dotfiles repository path
  ansible.builtin.set_fact:
    stow_dotfiles_repo_path: "{{ stow_dotfiles_win_home_dir.stdout | default('') if is_windows else ansible_facts.env.HOME }}/.dotfiles"

- name: Set git executable path (Windows)
  when: is_windows
  block:
    - name: Check for Git in standard locations
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ stow_dotfiles_win_home_dir.stdout }}/scoop/shims/git.exe"
        - "/c/Program Files/Git/cmd/git.exe"
        - "/c/Program Files/Git/bin/git.exe"
      register: stow_dotfiles_git_check

    - name: Set git executable path fact
      ansible.builtin.set_fact:
        stow_dotfiles_git_executable: "{{ (stow_dotfiles_git_check.results | selectattr('stat.exists') | map(attribute='item') | first) | default('git') }}"

- name: Ensure .dotfiles directory exists
  ansible.builtin.file:
    path: "{{ stow_dotfiles_repo_path }}"
    state: directory
    mode: "0755"

- name: Check for local changes in .dotfiles repository # noqa: command-instead-of-module
  # NOTE: The ansible.builtin.git module does not support `git status --porcelain`,
  #       so we use `ansible.builtin.command` here.
  ansible.builtin.command: "{{ stow_dotfiles_git_executable | default('git') }} status --porcelain"
  args:
    chdir: "{{ stow_dotfiles_repo_path }}"
  register: stow_dotfiles_git_status
  changed_when: false
  failed_when: false

- name: Set fact if dotfiles repository is dirty
  ansible.builtin.set_fact:
    stow_dotfiles_is_dotfiles_repo_dirty: "{{ stow_dotfiles_git_status.stdout != '' }}"

- name: Resolve conflicts and stash local changes if any
  when: stow_dotfiles_is_dotfiles_repo_dirty
  block:
    - name: Get list of unmerged files # noqa: command-instead-of-module
      ansible.builtin.command: "{{ stow_dotfiles_git_executable | default('git') }} diff --name-only --diff-filter=U"
      args:
        chdir: "{{ stow_dotfiles_repo_path }}"
      register: stow_dotfiles_unmerged_files
      changed_when: false
      failed_when: false

    - name: Reset unmerged files to resolve conflicts # noqa: command-instead-of-module
      ansible.builtin.command: "{{ stow_dotfiles_git_executable | default('git') }} checkout HEAD -- {{ item }}"
      args:
        chdir: "{{ stow_dotfiles_repo_path }}"
      with_items: "{{ stow_dotfiles_unmerged_files.stdout_lines }}"
      when: "stow_dotfiles_unmerged_files.stdout != ''"
      changed_when: true

    - name: Stash local changes # noqa: command-instead-of-module
      # NOTE: The ansible.builtin.git module does not support `git stash`,
      #       so we use `ansible.builtin.command` here.
      ansible.builtin.command: "{{ stow_dotfiles_git_executable | default('git') }} stash"
      args:
        chdir: "{{ stow_dotfiles_repo_path }}"
      register: stow_dotfiles_git_stash
      changed_when: false

- name: Set fact if git stash was successful
  ansible.builtin.set_fact:
    stow_dotfiles_is_git_stash_successful: >-
      {{
        stow_dotfiles_git_stash.stdout is defined and
        'Saved working directory and index state' in stow_dotfiles_git_stash.stdout
      }}

- name: Clone or update .dotfiles repository
  ansible.builtin.git:
    repo: "{{ stow_dotfiles_repo_url }}"
    dest: "{{ stow_dotfiles_repo_path }}"
    version: main
    executable: "{{ stow_dotfiles_git_executable | default(omit) }}"

- name: Stow dotfiles with --adopt and restore git changes
  ansible.builtin.shell:
    cmd: |
      cd "{{ stow_dotfiles_repo_path }}"
      # NOTE: The --adopt flag is used to take ownership of existing files in the home directory
      #       that would otherwise conflict with stow's symlinking process. This allows stow
      #       to create symlinks for these files and move the original files into the .dotfiles
      #       repository. Immediately after, 'git restore .' is used to revert these changes
      #       in the .dotfiles repository, ensuring that the repository remains clean and
      #       reflects only the intended dotfiles from the origin.
      stow */ --adopt
      "{{ stow_dotfiles_git_executable | default('git') }}" restore .
  args:
    chdir: "{{ stow_dotfiles_repo_path }}"
  changed_when: true

- name: Unstash local changes # noqa: command-instead-of-module
  # NOTE: The ansible.builtin.git module does not support `git stash pop`,
  #       so we use `ansible.builtin.command` here.
  ansible.builtin.command: "{{ stow_dotfiles_git_executable | default('git') }} stash pop"
  args:
    chdir: "{{ stow_dotfiles_repo_path }}"
  when: stow_dotfiles_is_git_stash_successful
  changed_when: false
