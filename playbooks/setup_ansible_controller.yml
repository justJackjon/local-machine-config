- name: Setup Ansible Controller
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Set python interpreter
      ansible.builtin.include_tasks: ../common/tasks/set_python_interpreter.yml
      tags: always

      # NOTE: Manually father facts once python interpreter is set...
    - name: Manually gather facts
      ansible.builtin.setup:
      tags: always

    - name: Set OS facts
      ansible.builtin.include_tasks: ../common/tasks/set_os_facts.yml
      tags: always

    - name: Set system architecture facts
      ansible.builtin.include_tasks: ../common/tasks/set_sys_architecture_facts.yml
      tags: always

    - name: Set is_inside_xfce fact
      ansible.builtin.set_fact:
        is_inside_xfce: "{{ ansible_facts.env.XDG_CURRENT_DESKTOP is defined and ansible_facts.env.XDG_CURRENT_DESKTOP == 'XFCE' }}"
      tags: always

    - name: Execute pre-flight checks
      ansible.builtin.include_tasks: ../roles/pre_flight_checks/tasks/main.yml
      tags: always

  roles:
    - role: configure_msys2
      when: is_windows

    - role: install_base_packages
      tags: [install_base_packages, configure_git, configure_keyboard, configure_mcp_servers]

    - role: configure_system
      when: ansible_facts.os_family == 'Debian'

    - role: install_wsl_gui
      when: is_wsl | default(false)

    - role: configure_shell
      tags: [configure_shell, configure_mcp_servers]

    - role: configure_keyboard
      tags: configure_keyboard

    - install_browser
    - install_lazyvim
    - role: stow_dotfiles
      tags: [stow_dotfiles, configure_mcp_servers]

    - role: configure_git
      tags: configure_git

    - role: configure_mcp_servers
      tags: configure_mcp_servers

  post_tasks:
    - name: Display final instructions
      ansible.builtin.debug:
        msg:
          - "Playbook execution finished."
          - >-
            If you are having issues with commands not being found (e.g. 'nvim'),
            please run 'hash -r' or open a new terminal session to refresh your shell's command cache.

    - name: Display notice about skipped tasks due to lack of admin privileges
      when: not has_admin_privileges | default(true) and is_windows
      ansible.builtin.debug:
        msg:
          - "NOTICE: Playbook was run without administrator privileges."
          - "The following tasks were skipped. Please run the 'install.ps1' script as an Administrator to complete the setup."
          - "- Installing global pnpm packages (tree-sitter-cli, neovim)"
          - " {% if autohotkey_install_failed_due_to_permissions | default(false) %}- Installing AutoHotkey v1.1{% endif %}"

    - name: Display warning for manual Node.js cleanup on Windows
      ansible.builtin.debug:
        msg:
          - "WARNING: A conflicting system Node.js installation was found at 'C:\\Program Files\\nodejs' but could not be removed automatically."
          - "This may cause conflicts with the NVM-managed Node.js installation."
          - "Please manually remove this directory if you experience issues with Node.js versions."
      when:
        - is_windows
        - install_base_packages_node_removal_failed | default(false)

    - name: Display MCP Server Configuration Report
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "   MCP SERVER CONFIGURATION REPORT"
          - "=========================================="
          - "GitHub MCP Server:"
          - "  PAT Status:      {{ configure_mcp_servers_github_mcp_pat_status | default('Not Checked') }}"
          - "  MCP Status:      {{ configure_mcp_servers_github_mcp_install_status | default('Skipped') }}"
          - "  Action Needed:   {{ configure_mcp_servers_github_mcp_action_needed | default('None') }}"
          - ""
          - "Semgrep MCP Server:"
          - "  Status:          Installed & Configured (Community)"
          - "  Action Needed:   Run 'semgrep login' (Optional) for more rules."
          - "=========================================="
      tags: configure_mcp_servers

    - name: Add final instructions for GitHub
      ansible.builtin.debug:
        msg:
          - "GitHub Configuration Instructions:"
          - "1. Your SSH and GPG keys have been automatically added to your GitHub account."
          - "   If you have issues, ensure you are authenticated with the GitHub CLI by running 'gh auth login'."
          - ""
          - "2. IMPORTANT: You may need to start a new shell session (or run 'source ~/.bashrc') for the SSH agent to be available."
          - "   Until you do, operations like 'git clone' that require SSH may fail."
          - ""
          - "3. For work repositories, you can use a different git configuration by running the following commands inside the repository:"
          - '   git config --local user.name "Your Work Name"'
          - '   git config --local user.email "your-work@example.com"'
          - ""
          - "4. For manual key management:"
          - "   - Your public SSH key is at: {{ ansible_facts.env.HOME }}/.ssh/ansible-managed/github/id_rsa.pub"
          - "   - To get your public GPG key, run:"
          - "     gpg --armor --export --homedir {{ ansible_facts.env.HOME }}/.gnupg/ansible-managed/github {{ configure_git_user_email }}"
      tags: configure_git

    - name: Add final instructions for Kinto on WSL2
      ansible.builtin.debug:
        msg:
          - "Kinto is not supported on WSL2 due to limitations with the `uinput` kernel module."
          - "To enable macOS-style keybindings, please run this playbook on your Windows host."
      when: is_wsl
